<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Neon Strike - Fixed</title>
    <style>
        body { margin: 0; background: #000; color: #0ff; font-family: sans-serif; overflow: hidden; cursor: crosshair; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 10; pointer-events: none; }
        #hp-bg { width: 200px; height: 12px; background: #333; border: 1px solid #0ff; margin-top: 5px; }
        #hp-fill { width: 100%; height: 100%; background: #0f0; }
        #menu { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            z-index: 20; text-align: center; background: #000; padding: 40px; border: 2px solid #0ff; 
        }
        .btn { background: #0ff; color: #000; border: none; padding: 15px; font-weight: bold; cursor: pointer; width: 250px; margin: 10px; font-size: 18px; }
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="ui">
        SCORE: <span id="sc">0</span> | AMMO: <span id="am">10</span>
        <div id="hp-bg"><div id="hp-fill"></div></div>
    </div>

    <div id="menu">
        <h1>NEON STRIKE</h1>
        <button class="btn" id="startAR">ASSAULT (Dash)</button><br>
        <button class="btn" id="startSG">SHOTGUN (Explode)</button>
    </div>

    <canvas id="canvas"></canvas>

<script>
window.onload = function() {
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const menu = document.getElementById('menu');
    
    let w, h, player, active = false, audioCtx = null;
    let bullets = [], enemies = [], keys = {}, score = 0, gun = 'AR';
    let mx = 0, my = 0; // Mouse position

    function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
    }
    window.onresize = resize;
    resize();

    window.onmousemove = e => { mx = e.clientX; my = e.clientY; };

    function beep(freq, dur) {
        if (!audioCtx) return;
        const v = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        v.frequency.value = freq;
        g.gain.setValueAtTime(0.1, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
        v.connect(g); g.connect(audioCtx.destination);
        v.start(); v.stop(audioCtx.currentTime + dur);
    }

    function init(type) {
        gun = type;
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        menu.style.display = 'none';
        player = { x: w/2, y: h/2, hp: 100, ammo: 10 };
        active = true;
        
        // Background Beat
        setInterval(() => { if(active) beep(60, 0.2); }, 600);
        update();
    }

    document.getElementById('startAR').onclick = () => init('AR');
    document.getElementById('startSG').onclick = () => init('SG');

    window.onkeydown = e => keys[e.key.toLowerCase()] = true;
    window.onkeyup = e => keys[e.key.toLowerCase()] = false;

    window.onmousedown = () => {
        if (!active || player.ammo <= 0) return;
        const ang = Math.atan2(my - player.y, mx - player.x);
        bullets.push({x: player.x, y: player.y, vx: Math.cos(ang)*15, vy: Math.sin(ang)*15});
        player.ammo--;
        beep(300, 0.1);
        if (player.ammo <= 0) setTimeout(() => player.ammo = 10, 1000);
    };

    function update() {
        if (!active) return;
        requestAnimationFrame(update);

        ctx.fillStyle = 'rgba(0,0,0,0.2)';
        ctx.fillRect(0, 0, w, h);

        // Movement
        let s = keys.shift ? 10 : 5;
        if (keys.w) player.y -= s; if (keys.s) player.y += s;
        if (keys.a) player.x -= s; if (keys.d) player.x += s;

        // Draw Player
        ctx.fillStyle = '#0ff';
        ctx.beginPath(); ctx.arc(player.x, player.y, 15, 0, 7); ctx.fill();

        // Crosshair
        ctx.strokeStyle = '#0ff';
        ctx.beginPath(); ctx.arc(mx, my, 10, 0, 7); ctx.stroke();

        // Bullets
        bullets.forEach((b, i) => {
            b.x += b.vx; b.y += b.vy;
            ctx.fillStyle = '#ff0'; ctx.fillRect(b.x, b.y, 5, 5);
            if (b.x<0 || b.x>w || b.y<0 || b.y>h) bullets.splice(i, 1);
        });

        // Enemies
        if (Math.random() < 0.03) enemies.push({x: Math.random()*w, y: -20});
        enemies.forEach((e, i) => {
            let a = Math.atan2(player.y - e.y, player.x - e.x);
            e.x += Math.cos(a) * 2.5; e.y += Math.sin(a) * 2.5;
            ctx.fillStyle = '#f0f';
            ctx.beginPath(); ctx.arc(e.x, e.y, 15, 0, 7); ctx.fill();

            bullets.forEach((b, bi) => {
                if (Math.hypot(b.x-e.x, b.y-e.y) < 20) {
                    enemies.splice(i, 1); bullets.splice(bi, 1);
                    score += 10;
                }
            });

            if (Math.hypot(player.x-e.x, player.y-e.y) < 30) {
                player.hp -= 0.5;
            }
        });

        document.getElementById('sc').innerText = score;
        document.getElementById('am').innerText = player.ammo;
        document.getElementById('hp-fill').style.width = player.hp + "%";

        if (player.hp <= 0) location.reload();
    }
};
</script>
</body>
</html>
