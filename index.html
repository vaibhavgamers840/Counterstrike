<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Neon Strike</title>
    <style>
        body { margin: 0; background: #000; color: #0ff; font-family: Arial, sans-serif; overflow: hidden; }
        #menu { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            z-index: 100; background: #111; padding: 50px; border: 5px solid #0ff; text-align: center;
        }
        .btn { background: #0ff; color: #000; border: none; padding: 20px; font-weight: bold; cursor: pointer; font-size: 20px; }
        #stats { position: absolute; top: 10px; left: 10px; z-index: 10; font-size: 20px; }
        canvas { display: block; }
    </style>
</head>
<body>
    <div id="stats">Score: 0</div>
    <div id="menu">
        <h1>NEON STRIKE</h1>
        <p>HIGH GRAPHICS ENABLED</p>
        <button class="btn" onclick="start()">CLICK TO START MISSION</button>
    </div>
    <canvas id="c"></canvas>

<script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let active = false, score = 0, px = canvas.width/2, py = canvas.height/2;
    let enemies = [], bullets = [], keys = {};

    function start() {
        document.getElementById('menu').style.display = 'none';
        active = true;
        gameLoop();
    }

    window.onkeydown = e => keys[e.key.toLowerCase()] = true;
    window.onkeyup = e => keys[e.key.toLowerCase()] = false;
    window.onmousedown = e => {
        if(!active) return;
        let ang = Math.atan2(e.clientY - py, e.clientX - px);
        bullets.push({x: px, y: py, vx: Math.cos(ang)*10, vy: Math.sin(ang)*10});
    };

    function gameLoop() {
        if(!active) return;
        requestAnimationFrame(gameLoop);
        ctx.fillStyle = 'rgba(0,0,0,0.2)';
        ctx.fillRect(0,0,canvas.width, canvas.height);

        // Move Player
        if(keys.w) py -= 5; if(keys.s) py += 5;
        if(keys.a) px -= 5; if(keys.d) px += 5;

        // Draw Player
        ctx.fillStyle = '#0ff';
        ctx.beginPath(); ctx.arc(px, py, 15, 0, Math.PI*2); ctx.fill();

        // Bullets
        bullets.forEach((b, i) => {
            b.x += b.vx; b.y += b.vy;
            ctx.fillStyle = '#ff0';
            ctx.fillRect(b.x, b.y, 5, 5);
            if(b.x < 0 || b.x > canvas.width) bullets.splice(i, 1);
        });

        // Enemies
        if(Math.random() < 0.05) enemies.push({x: Math.random()*canvas.width, y: -20});
        enemies.forEach((e, i) => {
            e.y += 3;
            ctx.fillStyle = 'red';
            ctx.beginPath(); ctx.arc(e.x, e.y, 15, 0, Math.PI*2); ctx.fill();
            
            // Hit detection
            bullets.forEach((b, bi) => {
                if(Math.hypot(b.x - e.x, b.y - e.y) < 20) {
                    enemies.splice(i, 1); bullets.splice(bi, 1);
                    score += 10;
                    document.getElementById('stats').innerText = "Score: " + score;
                }
            });
            if(e.y > canvas.height) enemies.splice(i, 1);
            if(Math.hypot(px-e.x, py-e.y) < 30) location.reload();
        });
    }
</script>
</body>
</html>
