<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Strike - Extreme Edition</title>
    <style>
        body { margin: 0; background: #000; color: #0ff; font-family: sans-serif; overflow: hidden; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 10; font-size: 20px; text-shadow: 0 0 10px #0ff; width: 100%; }
        #hp-container { width: 200px; height: 20px; background: #333; border: 2px solid #0ff; margin-top: 10px; }
        #hp-bar { width: 100%; height: 100%; background: #0ff; transition: 0.2s; box-shadow: 0 0 10px #0ff; }
        #msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 20; background: rgba(0,0,0,0.9); padding: 40px; border: 2px solid #0ff; }
        .btn { background: #0ff; color: #000; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; font-size: 20px; border-radius: 5px; margin: 5px; width: 200px; }
        canvas { display: block; position: absolute; top: 0; left: 0; }
    </style>
</head>
<body>

    <div id="ui">
        SCORE: <span id="sc">0</span> | AMMO: <span id="am">10</span>
        <div id="hp-container"><div id="hp-bar"></div></div>
        <small>[E] ABILITY READY</small>
    </div>
    
    <div id="msg">
        <h1 style="font-size: 50px; margin-bottom: 10px;">NEON STRIKE</h1>
        <button class="btn" onclick="init('AR')">ASSAULT (Dash)</button><br>
        <button class="btn" onclick="init('SG')">SHOTGUN (Explode)</button>
    </div>

    <canvas id="g"></canvas>

<script>
    const c = document.getElementById('g');
    const ctx = c.getContext('2d');
    const msg = document.getElementById('msg');
    const hpBar = document.getElementById('hp-bar');

    let w, h, active = false, audioCtx;
    let px, py, score = 0, ammo = 10, hp = 100, abilityCD = 0;
    let bullets = [], enemies = [], particles = [], explosions = [], keys = {};
    let gunType = 'AR';

    function resize() { w = c.width = window.innerWidth; h = c.height = window.innerHeight; }
    window.onresize = resize; resize();

    // --- AUDIO ENGINE ---
    function playSound(freq, type, duration, vol, slide = false) {
        if(!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        if(slide) osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + duration);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    function startMusic() {
        setInterval(() => { if(active) playSound(110, 'triangle', 0.2, 0.03); }, 400); // Bass pulse
    }

    function init(type) {
        gunType = type;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        msg.style.display = 'none';
        px = w/2; py = h/2;
        hp = 100; score = 0; active = true;
        startMusic();
        loop();
    }

    window.onkeydown = e => {
        keys[e.key.toLowerCase()] = true;
        if(e.key.toLowerCase() === 'e' && abilityCD <= 0) useAbility();
    };
    window.onkeyup = e => keys[e.key.toLowerCase()] = false;

    window.onmousedown = e => {
        if(!active || ammo <= 0) return;
        let ang = Math.atan2(e.clientY - py, e.clientX - px);
        
        if(gunType === 'AR') {
            playSound(400, 'sawtooth', 0.1, 0.1, true);
            bullets.push({x: px, y: py, vx: Math.cos(ang)*18, vy: Math.sin(ang)*18, s:4});
            ammo--;
        } else {
            playSound(200, 'sawtooth', 0.2, 0.15, true);
            for(let i=-2; i<=2; i++) { // Shotgun spread
                bullets.push({x: px, y: py, vx: Math.cos(ang + i*0.1)*12, vy: Math.sin(ang + i*0.1)*12, s:6});
            }
            ammo -= 2;
        }
        if(ammo <= 0) setTimeout(() => ammo = 10, 1000);
    };

    function useAbility() {
        abilityCD = 240;
        if(gunType === 'SG') { // Explosion
            playSound(50, 'square', 0.5, 0.3);
            explosions.push({x: px, y: py, r: 0, life: 30});
        } else { // Dash
            playSound(800, 'sine', 0.2, 0.2);
            let ang = Math.atan2((keys.s?1:0)-(keys.w?1:0), (keys.d?1:0)-(keys.a?1:0));
            if(!keys.w && !keys.s && !keys.a && !keys.d) ang = 0; 
            px += Math.cos(ang) * 150; py += Math.sin(ang) * 150;
        }
    }

    function part(x, y, color) {
        for(let i=0; i<10; i++) particles.push({x, y, vx:(Math.random()-0.5)*10, vy:(Math.random()-0.5)*10, a:1, c:color});
    }

    function loop() {
        if(!active) return;
        requestAnimationFrame(loop);
        ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(0, 0, w, h);

        if(abilityCD > 0) abilityCD--;

        let speed = keys.shift ? 9 : 5;
        if(keys.w && py > 20) py -= speed; if(keys.s && py < h-20) py += speed;
        if(keys.a && px > 20) px -= speed; if(keys.d && px < w-20) px += speed;

        // Player
        ctx.shadowBlur = 15; ctx.shadowColor = '#0ff';
        ctx.fillStyle = '#0ff'; ctx.beginPath(); ctx.arc(px, py, 15, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;

        // Explosions
        explosions.forEach((ex, i) => {
            ex.r += 6; ex.life--;
            ctx.strokeStyle = '#0ff'; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.arc(ex.x, ex.y, ex.r, 0, Math.PI*2); ctx.stroke();
            enemies.forEach((e, ei) => {
                if(Math.hypot(ex.x-e.x, ex.y-e.y) < ex.r + 20) {
                    part(e.x, e.y, '#f00'); enemies.splice(ei, 1); score += 20;
                }
            });
            if(ex.life <= 0) explosions.splice(i, 1);
        });

        // Bullets
        bullets.forEach((b, i) => {
            b.x += b.vx; b.y += b.vy;
            ctx.fillStyle = '#ff0'; ctx.fillRect(b.x, b.y, b.s, b.s);
            if(b.x < 0 || b.x > w || b.y < 0 || b.y > h) bullets.splice(i, 1);
        });

        // Enemies
        if(Math.random() < 0.05) enemies.push({x: Math.random()*w, y: -20, s: 2.5 + Math.random()*2});
        enemies.forEach((e, i) => {
            let ang = Math.atan2(py-e.y, px-e.x);
            e.x += Math.cos(ang)*e.s; e.y += Math.sin(ang)*e.s;
            ctx.fillStyle = '#f00'; ctx.beginPath(); ctx.arc(e.x, e.y, 15, 0, Math.PI*2); ctx.fill();

            bullets.forEach((b, bi) => {
                if(Math.hypot(b.x-e.x, b.y-e.y) < 20) {
                    playSound(1000, 'sine', 0.05, 0.05);
                    part(e.x, e.y, '#f00'); enemies.splice(i, 1); bullets.splice(bi, 1); score += 10;
                }
            });

            if(Math.hypot(px-e.x, py-e.y) < 30) {
                hp -= 1;
                hpBar.style.width = hp + "%";
                if(hp <= 0) {
                    active = false;
                    msg.style.display = 'block';
                    msg.innerHTML = `<h1>WASTED</h1><p>SCORE: ${score}</p><button class="btn" onclick="location.reload()">RETRY</button>`;
                }
            }
        });

        // Particles
        particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.a -= 0.02;
            ctx.globalAlpha = p.a; ctx.fillStyle = p.c; ctx.fillRect(p.x, p.y, 3, 3);
            if(p.a <= 0) particles.splice(i, 1);
        });
        ctx.globalAlpha = 1;

        document.getElementById('sc').innerText = score;
        document.getElementById('am').innerText = ammo;
    }
</script>
</body>
</html>
