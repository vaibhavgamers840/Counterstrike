<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Neon Strike - Full Audio</title>
    <style>
        body { margin: 0; background: #000; color: #0ff; font-family: 'Arial Black', sans-serif; overflow: hidden; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 100; font-size: 22px; text-shadow: 0 0 10px #0ff; pointer-events: none; }
        #msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 200; background: rgba(0,0,0,0.95); padding: 50px; border: 4px solid #0ff; width: 450px; box-shadow: 0 0 50px rgba(0,255,255,0.3); }
        .btn { background: #0ff; color: #000; border: none; padding: 20px; font-weight: bold; cursor: pointer; margin: 10px; width: 100%; font-size: 18px; transition: 0.3s; }
        .btn:hover { background: #fff; transform: scale(1.05); }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 16px; height: 16px; border: 2px solid #fff; border-radius: 50%; z-index: 150; pointer-events: none; }
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="ui">SCORE: 0 | HP: 100 | [E] ABILITY</div>
    <div id="crosshair"></div>
    
    <div id="msg">
        <h1 style="letter-spacing: 10px; color: #fff;">NEON_STRIKE</h1>
        <p style="color: #0ff; margin-bottom: 30px;">[ MUSIC + SFX ENABLED ]</p>
        <button class="btn" onclick="init('Heavy')">HEAVY CLASS (TANK)</button>
        <button class="btn" onclick="init('Ninja')">NINJA CLASS (SPEED)</button>
    </div>

    <canvas id="g"></canvas>

<script>
    const c = document.getElementById('g');
    const ctx = c.getContext('2d');
    const ui = document.getElementById('ui');
    const msg = document.getElementById('msg');

    let w, h, active = false, audioCtx;
    let px = 2000, py = 2000, dir = 0, hp = 100, score = 0, kills = 0;
    let pClass = '', abilityCD = 0, recoil = 0;
    let bullets = [], enemies = [], objects = [], explosions = [], keys = {};

    for(let i=0; i<50; i++) objects.push({x: Math.random()*4000, y: Math.random()*4000, s: 70});

    // --- ENHANCED AUDIO ENGINE ---
    function playSound(freq, type, duration, vol, slide = false) {
        if(!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        if(slide) osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + duration);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    function startMusic() {
        const sequence = [110, 110, 130, 110, 164, 110, 130, 146]; // Bassline
        let step = 0;
        setInterval(() => {
            if(!active) return;
            playSound(sequence[step % 8], 'sawtooth', 0.2, 0.05);
            if(step % 4 === 0) playSound(60, 'triangle', 0.1, 0.1); // Kick
            step++;
        }, 200);
    }

    function resize() { w = c.width = window.innerWidth; h = c.height = window.innerHeight; }
    window.onresize = resize; resize();

    function init(type) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        pClass = type;
        msg.style.display = 'none';
        active = true;
        c.requestPointerLock();
        for(let i=0; i<12; i++) spawnEnemy();
        startMusic();
        loop();
    }

    function spawnEnemy() { enemies.push({x: Math.random()*4000, y: Math.random()*4000, hp: 100, cd: 80}); }

    document.onmousemove = e => { if(document.pointerLockElement === c) dir += e.movementX * 0.003; };
    window.onkeydown = e => { keys[e.code] = true; if(e.code === 'KeyE' && abilityCD <= 0) useAbility(); };
    window.onkeyup = e => keys[e.code] = false;
    
    window.onmousedown = () => { 
        if(!active) return;
        playSound(400, 'sawtooth', 0.1, 0.08, true); 
        recoil = 20;
        bullets.push({x: px, y: py, vx: Math.cos(dir)*55, vy: Math.sin(dir)*55, life: 60, owner: 'p', type: 'bullet'});
    };

    function useAbility() {
        abilityCD = 300;
        if(pClass === 'Heavy') {
            playSound(100, 'sine', 0.5, 0.2);
            bullets.push({x: px, y: py, vx: Math.cos(dir)*30, vy: Math.sin(dir)*30, life: 60, owner: 'p', type: 'grenade'});
        } else {
            playSound(800, 'triangle', 0.2, 0.15); 
            px += Math.cos(dir) * 450; py += Math.sin(dir) * 450;
        }
    }

    function createExplosion(x, y) {
        playSound(50, 'square', 0.6, 0.3);
        explosions.push({x, y, r: 10, life: 30});
        enemies.forEach(en => {
            if(Math.hypot(x-en.x, y-en.y) < 180) {
                en.hp = 0; score += 150; kills++;
                setTimeout(() => { en.hp=100; en.x=px+(Math.random()-0.5)*2000; }, 2000);
            }
        });
    }

    function loop() {
        if(!active) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        requestAnimationFrame(loop);
        
        let speed = keys['ShiftLeft'] ? 14 : 9;
        let mx = 0, my = 0;
        if(keys['KeyW']) { mx += Math.cos(dir); my += Math.sin(dir); }
        if(keys['KeyS']) { mx -= Math.cos(dir); my -= Math.sin(dir); }
        if(keys['KeyA']) { mx += Math.cos(dir-1.57); my += Math.sin(dir-1.57); }
        if(keys['KeyD']) { mx += Math.cos(dir+1.57); my += Math.sin(dir+1.57); }
        px += mx * speed; py += my * speed;

        if(abilityCD > 0) abilityCD--;

        bullets.forEach((b, i) => {
            b.x += b.vx; b.y += b.vy; b.life--;
            if(b.owner === 'p') {
                enemies.forEach(en => {
                    if(en.hp > 0 && Math.hypot(b.x-en.x, b.y-en.y) < 60) {
                        playSound(800 + (kills * 50), 'sine', 0.08, 0.1); 
                        if(b.type === 'grenade') createExplosion(b.x, b.y);
                        else { en.hp = 0; score += 100; kills++; }
                        b.life = 0;
                    }
                });
            } else if(Math.hypot(b.x-px, b.y-py) < 35) { hp -= 3; b.life = 0; kills = 0; }
            if(b.life <= 0) {
                if(b.type === 'grenade' && b.owner === 'p') createExplosion(b.x, b.y);
                bullets.splice(i, 1);
            }
        });

        // RENDER
        ctx.fillStyle = '#000'; ctx.fillRect(0,0,w,h);
        
        let sprites = [...enemies, ...objects, ...bullets, ...explosions].map(s => {
            let dx = s.x-px, dy = s.y-py, a = Math.atan2(dy, dx)-dir;
            while(a < -Math.PI) a += Math.PI*2; while(a > Math.PI) a -= Math.PI*2;
            return { ...s, d: Math.hypot(dx,dy), a: a };
        }).sort((a,b) => b.d - a.d);

        sprites.forEach(s => {
            if(s.hp === 0 || s.d > 3500 || Math.abs(s.a) > 1.3) return;
            let x = (s.a / 1.1 + 0.5) * w;
            let h_3d = (h * 60) / s.d;

            if(s.r) { 
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 3;
                ctx.beginPath(); ctx.arc(x, h/2, (s.r*120)/s.d, 0, 7); ctx.stroke();
                s.r += 6; s.life--; if(s.life <= 0) explosions.splice(explosions.indexOf(s), 1);
            } else if(s.s) { 
                ctx.strokeStyle = '#0ff'; ctx.lineWidth = 2;
                ctx.strokeRect(x-h_3d/2, h/2-h_3d, h_3d, h_3d*2);
            } else if(s.life) { 
                ctx.fillStyle = s.type === 'grenade' ? '#fff' : (s.owner==='p'?'#0ff':'#f00');
                ctx.beginPath(); ctx.arc(x, h/2, 300/s.d, 0, 7); ctx.fill();
            } else { 
                ctx.strokeStyle = '#f0f'; ctx.lineWidth = 4;
                ctx.strokeRect(x-h_3d/3, h/2-h_3d, h_3d/1.5, h_3d*2);
                s.cd--; if(s.cd <= 0) {
                    bullets.push({x: s.x, y: s.y, vx: Math.cos(Math.atan2(py-s.y, px-s.x))*25, vy: Math.sin(Math.atan2(py-s.y, px-s.x))*25, life: 100, owner: 'e', type: 'bullet'});
                    s.cd = 90;
                }
            }
        });

        // ViewModel (Weapon)
        ctx.fillStyle = '#0ff';
        ctx.shadowBlur = 15; ctx.shadowColor = '#0ff';
        ctx.fillRect(w*0.75, h-220+recoil, 90, 300);
        ctx.shadowBlur = 0;
        if(recoil > 0) recoil -= 3;

        ui.innerText = `SCORE: ${score} | HP: ${Math.floor(hp)} | ABILITY: ${abilityCD > 0 ? Math.ceil(abilityCD/60)+'s' : 'READY'}`;
        if(hp <= 0) { active = false; alert("MISSION FAILED. FINAL SCORE: " + score); location.reload(); }
    }
</script>
</body>
</html>
